<h1>Feed</h1>

<form action="/upload" method="POST" enctype="multipart/form-data">
    <input type="file" name="file">
    <button>Upload</button>
</form>

<a href="/logout">Logout</a>

<hr>

{% for img in images %}
  <div style="margin-bottom:30px;">
    <img src="/uploads/{{ img.filename }}" width="300" style="border-radius:10px;">

    <p>like{{ img.likes }}</p>

    <a href="/like/{{ img.id }}">
      <button>Like</button>
    </a>
  </div>
{% endfor %}
