<!DOCTYPE html>
<html>
<head>
    <title>Image Server</title>
    <style>
        body {
            font-family: Arial;
            background: #111;
            color: white;
            text-align: center;
        }

        .grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
        }

        .grid img {
            width: 250px;
            border-radius: 10px;
            transition: 0.2s;
        }

        .grid img:hover {
            transform: scale(1.05);
        }

        .upload-box {
            margin: 20px;
        }
    </style>
</head>

<body>

    <h1>Upload</h1>

<form method="POST" enctype="multipart/form-data">
  <input type="file" name="file">
  <button>Upload</button>
</form>

<a href="/logout">Logout</a>

<h2>Galerie</h2>

{% for img in images %}
  <img src="/uploads/{{ img.filename }}" width="200">
{% endfor %}

</body>
</html>
